<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontact - Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #0D47A1;
      --primary-light: #4DA3FF;
      --bg-main: #F7FBFF;
      --bg-card: #FFFFFF;
      --bg-hover: #F3F4F6;
      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --success: #22C55E;
      --warning: #F59E0B;
      --error: #EF4444;
      --border-light: #E5E7EB;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; background: var(--bg-main); }

    .left {
      width: 45%;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 40px;
    }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 24px; }
    .left h2 { font-size: 36px; font-weight: 700; text-align: center; line-height: 1.3; }

    .right {
      width: 55%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .form-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .form-box h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .form-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }

    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border-light);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 18px;
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(77,163,255,0.15);
    }
    input::placeholder { color: var(--text-muted); }

    .forgot { text-align: right; margin-top: -12px; margin-bottom: 18px; }
    .forgot a { font-size: 13px; color: var(--primary-light); text-decoration: none; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary-light);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #3B8FEF; }

    .divider { text-align: center; color: var(--text-muted); margin: 18px 0; font-size: 13px; }

    .btn-social {
      width: 100%;
      padding: 11px;
      background: var(--bg-card);
      border: 2px solid var(--border-light);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-bottom: 10px;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .btn-social:hover { border-color: var(--primary-light); }

    .signup { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
    .signup a { color: var(--primary-light); font-weight: 600; text-decoration: none; }

    @media (max-width: 640px) {
      .left { display: none; }
      .right { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="logo"> Kontact</div>
    <h2>Heureux de vous revoir</h2>
    <div style="width: 85%; height: 320px;backGround:rgba(255,255,255,0.2); border-radius: 24px; margin-top: 30px; border: 2px solid rgba(255,255,255,0.3);"></div>
  </div>

  <div class="right">
    <div class="form-box">
      <h1>Connexion à Kontact</h1>
      <p>Connectez-vous pour continuer.</p>

      <form action="/auth/login" method="POST">
        <label>Email ou Numéro de téléphone</label>
        <input type="text" name="email" placeholder="exemple@kontact.com" required>

        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <div class="forgot"><a href="/public/forgot-password.html">Mot de passe oublié ?</a></div>

        <button type="submit" class="btn-primary">Se connecter</button>
      </form>

      <div class="divider">ou</div>
      <button class="btn-social">Se connecter avec Google</button>
      <button class="btn-social">Se connecter avec Facebook</button>

      <div class="signup">Pas encore de compte ? <a href="/public/registrer.html">S'inscrire</a></div>
    </div>
  </div>
</body>
</html>
